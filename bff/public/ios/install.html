<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Install VoyixMobile</title>
  <style>
    body{font-family:-apple-system,sans-serif;background:#f5f5f5;margin:0;padding:24px;text-align:center}
    .card{background:#fff;border-radius:16px;padding:32px 24px;max-width:400px;margin:0 auto;box-shadow:0 2px 12px rgba(0,0,0,.08)}
    h1{color:#CC0000;font-size:24px;margin-bottom:4px}
    p{color:#666;font-size:14px;margin-bottom:24px}
    img{width:260px;height:260px;border:1px solid #eee;border-radius:8px}
    .btn{display:inline-block;margin-top:24px;background:#CC0000;color:#fff;padding:14px 32px;border-radius:10px;text-decoration:none;font-size:17px;font-weight:600}
    .note{font-size:12px;color:#aaa;margin-top:16px;line-height:1.5}
  </style>
</head>
<body>
  <div class="card">
    <h1>VoyixMobile</h1>
    <p>iOS v1.0.5 · Kmart mPOS</p>
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=itms-services%3A%2F%2F%3Faction%3Ddownload-manifest%26url%3Dhttps%253A%252F%252Fvoyixmobile.onrender.com%252Fios%252Fmanifest.plist" alt="Scan to install" />
    <br>
    <a class="btn" href="itms-services://?action=download-manifest&url=https%3A%2F%2Fvoyixmobile.onrender.com%2Fios%2Fmanifest.plist">Tap to Install</a>
    <p class="note">Scan QR code on your iPhone to install.<br>Or tap "Tap to Install" if you're already on your iPhone.<br><br>Your UDID must be registered in the provisioning profile.</p>
  </div>
</body>
</html>
